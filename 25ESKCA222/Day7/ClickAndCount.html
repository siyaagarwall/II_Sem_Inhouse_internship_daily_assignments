<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Click Counter</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link href="clickCounter.css" rel="stylesheet">
</head>

<body>
   
    <h1 class="p-3 mb-2 mt-4 text-danger-emphasis d-flex justify-content-center">CLICK & COUNT</h1>
        <br><br>
        <div><button>CLICK ME!!!</button></div>
        <p class="display">COUNT: <span>0</span></p><br><br>
        <div><input type="reset" id="resetbtn" value="reset"/>
        </div>
 <script>
    alert("Count the no. of clicks");
    const button=document.querySelector("button");
    button.addEventListener("click",clickCount);

    const reset=document.querySelector("#resetbtn");
    reset.addEventListener("click",clearCount);

    function clickCount(){
        let count = parseInt(button.dataset.count || 0);
        count++;
        button.dataset.count=count;
        document.querySelector(".display").innerText=count;
    }

    function clearCount(){
        count=0;
        document.querySelector(".display").innerText=count;
    }

 </script>


</body>

</html>

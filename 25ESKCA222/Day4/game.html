<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Click and Win</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            position: relative;
            height: 100vh;
            overflow: hidden;
        }

        img {
            position: absolute;
            width: 100px;
            height: 100px;
            cursor: pointer;
        }
    </style>
</head>

<body class="p-3 bg-danger-subtle">

    <h2 class="text-center">CLICK and WIN</h2>

    <div class="alert alert-secondary">
        Click the Image in the given time and Win!
    </div>

    <h4>Apple Score: <span id="appleCount">0</span></h4>
    <h4>Mango Score: <span id="mangoCount">0</span></h4>

    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcT766TRpT7qPtxYI27uLcmwc5udKJCFeT2cPZTmUh9ZtA&s=3"
        id="apple" onclick="clickImage('apple', this)">

    <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQRNYSU5DFSFTyGtaWWtVUm-AH1uKWQ5e1MDcmxsEOSfw&s=3"
        id="mango" onclick="clickImage('mango', this)">

    <br><br><br>

    <h2>Time: <span id="timer">30</span></h2>

    <button class="btn btn-success" onclick="startTimer()">Start</button>
    <button class="btn btn-danger" onclick="resetTimer()">Reset</button>

    <script>
        let apple = 0;
        let mango = 0;
        let timeLeft = 30;
        let countDown;

        // Move both images to random positions
        function moveImages() {
            document.querySelectorAll("img").forEach(img => {
                img.style.left = Math.random() * (window.innerWidth - 120) + "px";
                img.style.top = Math.random() * (window.innerHeight - 180) + "px";
            });
        }

        moveImages();

        function clickImage(type, img) {

            if (timeLeft <= 0) return;

            if (type === "apple") {
                apple++;
                document.getElementById("appleCount").innerText = apple;
            } else {
                mango++;
                document.getElementById("mangoCount").innerText = mango;
            }

            // Move clicked image
            img.style.left = Math.random() * (window.innerWidth - 120) + "px";
            img.style.top = Math.random() * (window.innerHeight - 180) + "px";
        }

        function startTimer() {

            clearInterval(countDown);

            timeLeft = 30;
            document.getElementById("timer").innerText = timeLeft;

            countDown = setInterval(function () {

                timeLeft--;
                document.getElementById("timer").innerText = timeLeft;

                if (timeLeft <= 0) {

                    clearInterval(countDown);

                    alert(
                        "Game Over!\n\nApple Score: " +
                        apple +
                        "\nMango Score: " +
                        mango
                    );

                    document.body.classList.remove("bg-danger-subtle");
                    document.body.classList.add("bg-warning");
                }

            }, 1000);
        }

        function resetTimer() {

            clearInterval(countDown);

            apple = 0;
            mango = 0;
            timeLeft = 30;

            document.getElementById("appleCount").innerText = 0;
            document.getElementById("mangoCount").innerText = 0;
            document.getElementById("timer").innerText = 30;

            document.body.classList.remove("bg-warning");
            document.body.classList.add("bg-danger-subtle");

            moveImages();
        }
    </script>

</body>

</html>
